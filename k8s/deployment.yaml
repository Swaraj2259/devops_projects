apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalchainx-app
  namespace: default
  labels:
    app: globalchainx
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: globalchainx
  template:
    metadata:
      labels:
        app: globalchainx
        tier: frontend
    spec:
      containers:
        - name: globalchainx-app
          image: swataj/globalchainx-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: production